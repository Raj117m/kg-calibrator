<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="kg Calibrator">
<meta name="theme-color" content="#0b0b0f">
<title>kg Calibrator</title>
<style>
  * { box-sizing: border-box; }
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    padding: 0;
    background: #0b0b0f;
    color: #f2f2f2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 18px;
  }
  body {
    padding: calc(env(safe-area-inset-top) + 1.5rem) 1.25rem calc(env(safe-area-inset-bottom) + 2rem);
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.6rem;
    margin: 0 0 0.25rem;
  }
  .sub {
    color: #999;
    margin: 0 0 1.5rem;
    font-size: 0.95rem;
  }
  .card {
    background: #17171d;
    border: 1px solid #26262e;
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .card h2 {
    font-size: 1.05rem;
    margin: 0 0 0.75rem;
    color: #ccc;
  }
  .metric {
    font-size: 2.1rem;
    font-weight: 700;
    line-height: 1.15;
  }
  .metric-sub {
    color: #999;
    font-size: 0.9rem;
    margin-top: 0.35rem;
  }
  form { display: flex; flex-direction: column; gap: 0.9rem; }
  label {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    font-size: 0.95rem;
    color: #bbb;
  }
  input[type="number"], input[type="text"] {
    font-size: 1.1rem;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    border: 1px solid #2e2e38;
    background: #0f0f14;
    color: #fff;
    width: 100%;
    -webkit-appearance: none;
  }
  input:focus {
    outline: 2px solid #4d8dff;
  }
  button {
    font-size: 1.1rem;
    font-weight: 600;
    padding: 0.95rem 1rem;
    min-height: 52px;
    border-radius: 12px;
    border: none;
    background: #4d8dff;
    color: #fff;
    cursor: pointer;
  }
  button:active { background: #3b73db; }
  button.secondary {
    background: transparent;
    border: 1px solid #333;
    color: #ddd;
  }
  .weight-flag {
    background: #22240f;
    border: 1px solid #4a4a1f;
    color: #e5d76a;
    font-size: 0.85rem;
    padding: 0.6rem 0.8rem;
    border-radius: 10px;
  }
  .entries { display: flex; flex-direction: column; gap: 0.6rem; }
  .entry {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    background: #101015;
    border: 1px solid #24242c;
    border-radius: 12px;
    padding: 0.85rem 1rem;
  }
  .entry-main { flex: 1; min-width: 0; }
  .entry-date { font-size: 0.85rem; color: #999; }
  .today-tag {
    color: #4d8dff;
    font-weight: 600;
  }
  .entry-status {
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 0.15rem;
  }
  .entry-status.deficit { color: #6fcf6f; }
  .entry-status.surplus { color: #ff8f6b; }
  .entry-weight {
    display: inline-block;
    margin-top: 0.25rem;
    font-size: 0.8rem;
    color: #e5d76a;
  }
  .entry-main details {
    margin-top: 0.35rem;
  }
  .entry-main summary {
    cursor: pointer;
    font-size: 0.8rem;
    color: #4d8dff;
  }
  .entry-calc {
    margin-top: 0.4rem;
    font-size: 0.85rem;
    color: #999;
    line-height: 1.6;
  }
  .del-btn {
    flex-shrink: 0;
    min-height: 40px;
    min-width: 40px;
    padding: 0;
    font-size: 1.1rem;
    font-weight: 700;
    background: #2a1414;
    color: #ff8080;
    border: 1px solid #3a1c1c;
    border-radius: 10px;
  }
  .empty {
    color: #777;
    font-size: 0.9rem;
    text-align: center;
    padding: 1rem 0;
  }

  .people-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }
  .people-pills {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    flex: 1;
    min-width: 0;
  }
  .person-pill {
    flex-shrink: 0;
    padding: 0.5rem 1rem;
    border-radius: 999px;
    background: #17171d;
    border: 1px solid #26262e;
    color: #ccc;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .person-pill.active {
    background: #4d8dff;
    border-color: #4d8dff;
    color: #fff;
  }
  .add-person-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    min-height: 44px;
    border-radius: 50%;
    padding: 0;
    font-size: 1.4rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #add-person-form {
    flex-direction: row;
    margin-bottom: 1.25rem;
  }
  #add-person-form input { flex: 1; }
  #add-person-form button { flex-shrink: 0; width: auto; padding: 0 1.2rem; }

  [hidden] { display: none !important; }
</style>
</head>
<body>

  <div class="people-bar">
    <div id="people-pills" class="people-pills"></div>
    <button id="add-person-btn" class="add-person-btn" type="button" aria-label="Add person">+</button>
  </div>
  <form id="add-person-form" hidden>
    <input type="text" id="new-person-name" placeholder="Their name" required>
    <button type="submit">Add</button>
  </form>

  <h1>kg Calibrator</h1>
  <p class="sub" id="active-sub">Your personal calories-per-kg number.</p>

  <div id="onboarding-card" class="card" hidden>
    <h2>Welcome, <span id="onboarding-name"></span></h2>
    <p class="metric-sub" style="margin-bottom: 1rem;">Let's start with a current weight. This becomes the baseline for calibration.</p>
    <form id="onboarding-form">
      <label>Starting weight (kg)
        <input type="number" id="onboarding-weight" step="0.1" min="0" inputmode="decimal" required>
      </label>
      <button type="submit">Save &amp; Start</button>
    </form>
  </div>

  <div id="app" hidden>
    <div class="card">
      <h2>Calibration</h2>
      <div id="calibration-content"></div>
    </div>

    <div class="card">
      <h2>Log today</h2>
      <form id="log-form">
        <label>Calories eaten
          <input type="number" id="log-eaten" inputmode="numeric" min="0" required>
        </label>
        <label>Exercise calories burned
          <input type="number" id="log-burned" inputmode="numeric" min="0" required>
        </label>
        <div id="weight-field" hidden>
          <div class="weight-flag">This is entry #<span id="weight-entry-num"></span> — time to log your current weight.</div>
          <label style="margin-top: 0.75rem;">Current weight (kg)
            <input type="number" id="log-weight" step="0.1" min="0" inputmode="decimal">
          </label>
        </div>
        <button type="submit">Add Entry</button>
      </form>
    </div>

    <div class="card">
      <h2>Entries</h2>
      <div id="entries-list" class="entries"></div>
    </div>
  </div>

  <script>
    var BASELINE_BURN = 1750;

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function todayStr() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function totalBurned(entry) {
      return entry.exerciseBurned + BASELINE_BURN;
    }

    // --- people & storage ---

    function loadPeople() {
      var raw = localStorage.getItem('kgcal_people');
      return raw ? JSON.parse(raw) : [];
    }
    function savePeople(people) {
      localStorage.setItem('kgcal_people', JSON.stringify(people));
    }
    function loadActivePersonId() {
      return localStorage.getItem('kgcal_active_person') || '';
    }
    function saveActivePersonId(id) {
      localStorage.setItem('kgcal_active_person', id);
    }
    function personDataKey(id) {
      return 'kgcal_data_' + id;
    }
    function loadPersonData(id) {
      var raw = localStorage.getItem(personDataKey(id));
      return raw ? JSON.parse(raw) : null;
    }
    function savePersonData(id, data) {
      localStorage.setItem(personDataKey(id), JSON.stringify(data));
    }

    function migrateIfNeeded() {
      if (localStorage.getItem('kgcal_people')) return;
      var oldData = localStorage.getItem('kgcal_data');
      var id = 'p_' + genId();
      if (oldData) {
        localStorage.setItem(personDataKey(id), oldData);
        localStorage.removeItem('kgcal_data');
      }
      savePeople([{ id: id, name: 'Raj' }]);
      saveActivePersonId(id);
    }

    function ensureActivePerson() {
      var people = loadPeople();
      var activeId = loadActivePersonId();
      if (!people.some(function (p) { return p.id === activeId; })) {
        saveActivePersonId(people[0].id);
      }
    }

    // --- calibration ---

    function calibration(data) {
      var weighIns = [];
      data.entries.forEach(function (e, i) {
        if (e.weight != null) weighIns.push({ weight: e.weight, idx: i, date: e.date });
      });
      var points = [{ weight: data.startingWeight, idx: -1, date: data.startingDate }].concat(weighIns);
      if (points.length < 2) return null;

      var first = points[0];
      var latest = points[points.length - 1];
      var kgChange = latest.weight - first.weight;
      var totalDeficit = 0;
      for (var i = 0; i <= latest.idx; i++) {
        totalDeficit += (totalBurned(data.entries[i]) - data.entries[i].eaten);
      }
      var kgLost = -kgChange;
      var caloriesPerKg = kgLost !== 0 ? totalDeficit / kgLost : null;

      return {
        first: first,
        latest: latest,
        kgChange: kgChange,
        totalDeficit: totalDeficit,
        caloriesPerKg: caloriesPerKg
      };
    }

    function renderCalibration(data) {
      var el = document.getElementById('calibration-content');
      var c = calibration(data);
      if (!c) {
        el.innerHTML = '<div class="metric-sub">Log weigh-ins (every 4th entry asks) to unlock the calibration number. You need at least one more weigh-in beyond the starting weight.</div>';
        return;
      }
      if (c.caloriesPerKg === null) {
        el.innerHTML = '<div class="metric-sub">Weight hasn\'t changed yet (' + c.first.weight + ' kg → ' + c.latest.weight + ' kg), so calories/kg can\'t be calculated yet.</div>';
        return;
      }
      var trend = c.kgChange < 0 ? 'lost' : 'gained';
      var kgAbs = Math.abs(c.kgChange).toFixed(1);
      el.innerHTML =
        '<div class="metric">' + Math.round(c.caloriesPerKg).toLocaleString() + ' kcal/kg</div>' +
        '<div class="metric-sub">' + c.first.weight + ' kg → ' + c.latest.weight + ' kg (' + trend + ' ' + kgAbs + ' kg) over a ' + c.totalDeficit.toLocaleString() + ' kcal deficit</div>';
    }

    function renderLogForm(data) {
      var today = todayStr();
      var todayIdx = data.entries.findIndex(function (e) { return e.date === today; });
      var editing = todayIdx !== -1;
      var entryNumber = editing ? todayIdx + 1 : data.entries.length + 1;
      var needsWeight = entryNumber % 4 === 0;

      document.getElementById('weight-field').hidden = !needsWeight;
      document.getElementById('weight-entry-num').textContent = entryNumber;
      document.getElementById('log-weight').required = needsWeight;

      var form = document.getElementById('log-form');
      form.dataset.editingId = editing ? data.entries[todayIdx].id : '';

      var eatenInput = document.getElementById('log-eaten');
      var burnedInput = document.getElementById('log-burned');
      var weightInput = document.getElementById('log-weight');
      var submitBtn = form.querySelector('button[type="submit"]');
      var focused = document.activeElement;

      if (editing && focused !== eatenInput && focused !== burnedInput && focused !== weightInput) {
        var todayEntry = data.entries[todayIdx];
        eatenInput.value = todayEntry.eaten;
        burnedInput.value = todayEntry.exerciseBurned;
        if (todayEntry.weight != null) weightInput.value = todayEntry.weight;
        submitBtn.textContent = 'Update Today\'s Entry';
      } else if (!editing) {
        submitBtn.textContent = 'Add Entry';
      }
    }

    function renderEntries(data) {
      var list = document.getElementById('entries-list');
      if (!data.entries.length) {
        list.innerHTML = '<div class="empty">No entries yet.</div>';
        return;
      }
      list.innerHTML = '';
      var today = todayStr();
      for (var i = data.entries.length - 1; i >= 0; i--) {
        (function (entry) {
          var row = document.createElement('div');
          row.className = 'entry';
          var burned = totalBurned(entry);
          var deficit = burned - entry.eaten;
          var isDeficit = deficit >= 0;
          var statusLabel = (isDeficit ? '−' : '+') + Math.abs(deficit) + ' kcal · ' + (isDeficit ? 'Deficit' : 'Surplus');
          row.innerHTML =
            '<div class="entry-main">' +
              '<div class="entry-date">' + entry.date + (entry.date === today ? ' <span class="today-tag">(today)</span>' : '') + '</div>' +
              '<div class="entry-status ' + (isDeficit ? 'deficit' : 'surplus') + '">' + statusLabel + '</div>' +
              '<details>' +
                '<summary>View</summary>' +
                '<div class="entry-calc">' +
                  'Eaten: ' + entry.eaten + ' kcal<br>' +
                  'Exercise burned: ' + entry.exerciseBurned + ' kcal<br>' +
                  'Baseline burn: ' + BASELINE_BURN + ' kcal<br>' +
                  'Total burned: ' + burned + ' kcal' +
                  (entry.weight != null ? '<br>Weighed in: ' + entry.weight + ' kg' : '') +
                '</div>' +
              '</details>' +
            '</div>' +
            '<button class="del-btn" aria-label="Delete entry">×</button>';
          row.querySelector('.del-btn').addEventListener('click', function () {
            var activeId = loadActivePersonId();
            var data = loadPersonData(activeId);
            data.entries = data.entries.filter(function (e) { return e.id !== entry.id; });
            savePersonData(activeId, data);
            renderAll(data);
          });
          list.appendChild(row);
        })(data.entries[i]);
      }
    }

    function renderAll(data) {
      renderCalibration(data);
      renderLogForm(data);
      renderEntries(data);
    }

    function renderPeopleBar() {
      var people = loadPeople();
      var activeId = loadActivePersonId();
      var container = document.getElementById('people-pills');
      container.innerHTML = '';
      people.forEach(function (p) {
        var pill = document.createElement('div');
        pill.className = 'person-pill' + (p.id === activeId ? ' active' : '');
        pill.textContent = p.name;
        pill.addEventListener('click', function () {
          saveActivePersonId(p.id);
          document.getElementById('add-person-form').hidden = true;
          renderForActivePerson();
        });
        container.appendChild(pill);
      });
    }

    function renderForActivePerson() {
      renderPeopleBar();
      var activeId = loadActivePersonId();
      var people = loadPeople();
      var activePerson = people.find(function (p) { return p.id === activeId; });
      var data = loadPersonData(activeId);

      document.getElementById('active-sub').innerHTML = 'Tracking for <strong>' + escapeHtml(activePerson.name) + '</strong>.';

      if (!data) {
        document.getElementById('onboarding-name').textContent = activePerson.name;
        document.getElementById('onboarding-card').hidden = false;
        document.getElementById('app').hidden = true;
      } else {
        document.getElementById('onboarding-card').hidden = true;
        document.getElementById('app').hidden = false;
        renderAll(data);
      }
    }

    function init() {
      migrateIfNeeded();
      ensureActivePerson();
      renderForActivePerson();
    }

    document.getElementById('add-person-btn').addEventListener('click', function () {
      var form = document.getElementById('add-person-form');
      form.hidden = !form.hidden;
      if (!form.hidden) document.getElementById('new-person-name').focus();
    });

    document.getElementById('add-person-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var nameInput = document.getElementById('new-person-name');
      var name = nameInput.value.trim();
      if (!name) return;
      var people = loadPeople();
      var newId = 'p_' + genId();
      people.push({ id: newId, name: name });
      savePeople(people);
      saveActivePersonId(newId);
      nameInput.value = '';
      document.getElementById('add-person-form').hidden = true;
      renderForActivePerson();
    });

    document.getElementById('onboarding-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var weight = parseFloat(document.getElementById('onboarding-weight').value);
      var activeId = loadActivePersonId();
      var data = { startingWeight: weight, startingDate: todayStr(), entries: [] };
      savePersonData(activeId, data);
      document.getElementById('onboarding-form').reset();
      renderForActivePerson();
    });

    document.getElementById('log-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var form = e.target;
      var activeId = loadActivePersonId();
      var data = loadPersonData(activeId);
      var eaten = parseInt(document.getElementById('log-eaten').value, 10);
      var exerciseBurned = parseInt(document.getElementById('log-burned').value, 10);
      var weightField = document.getElementById('weight-field');
      var weightVal = document.getElementById('log-weight').value;
      var weight = (!weightField.hidden && weightVal !== '') ? parseFloat(weightVal) : null;
      var editingId = form.dataset.editingId;

      if (editingId) {
        var existing = data.entries.find(function (e) { return e.id === editingId; });
        existing.eaten = eaten;
        existing.exerciseBurned = exerciseBurned;
        existing.weight = weight;
      } else {
        data.entries.push({
          id: genId(),
          date: todayStr(),
          eaten: eaten,
          exerciseBurned: exerciseBurned,
          weight: weight
        });
      }
      savePersonData(activeId, data);
      renderAll(data);
    });

    init();
  </script>
</body>
</html>
